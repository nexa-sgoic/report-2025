<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NEXA · Liquid Data — Dissolution</title>
  <style>
    html, body { margin:0; padding:0; background:#03020C; overflow:hidden; height:100%; }
    canvas { display:block; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
</head>
<body>
  <script src="shared/liquid-data.js"></script>
  <script>
    /* Dissolution · before closing/footer · "fluidity / dispersion" sensation
       Cluster center spawn · centrifugal bias · accent peach (orange-soft)
       Most ethereal pause · washEvery 240 for a more diaphanous output */
    let SC = null;
    const sketch = (p) => {
      p.setup = () => {
        const c = p.createCanvas(p.windowWidth, p.windowHeight);
        c.parent(document.body);
        SC = NEXALiquidData.scene({
          bg:           '#03020C',
          accent:       '#EDCCC0',           // peach (brand)
          neutral:      '#4A4742',
          kpiBag:       'water',
          N:            6000,
          strokeAlpha:  9,
          washAlpha:    2.0,
          washEvery:    240,                 // more washes · diaphanous
          timeStep:     0.0010,
          baseSpeed:    1.1,
          weightDamp:   0.55,
          maxLife:      500,                 // shorter life · dispersion
          burstThreshold: 0.78,
          // Strong centrifugal · particles flee the center
          biasFn: (part, W, H) => {
            const cx = W * 0.5, cy = H * 0.55;
            const dx = part.x - cx, dy = part.y - cy;
            const m = Math.hypot(dx, dy) || 1;
            return [(dx / m) * 0.34, (dy / m) * 0.34];
          },
          spawn: (W, H) => {
            const cx = W * 0.5, cy = H * 0.55;
            const r = Math.random() * 80;
            const a = Math.random() * Math.PI * 2;
            return [cx + Math.cos(a) * r, cy + Math.sin(a) * r];
          },
          respawn: (W, H) => {
            const cx = W * 0.5, cy = H * 0.55;
            const r = Math.random() * 60;
            const a = Math.random() * Math.PI * 2;
            return [cx + Math.cos(a) * r, cy + Math.sin(a) * r];
          }
        });
        SC.init(p);
      };
      p.draw = () => SC && SC.tick(p);
      p.windowResized = () => {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
        SC && SC.init(p);
      };
    };
    new p5(sketch);

    window.addEventListener('message', (e) => {
      if (!e.data || !SC) return;
      if (e.data.type === 'pause')  SC.pause();
      if (e.data.type === 'resume') SC.resume();
    });
  </script>
</body>
</html>
