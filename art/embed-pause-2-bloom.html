<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NEXA · Liquid Data — Bloom</title>
  <style>
    html, body { margin:0; padding:0; background:#0A0814; overflow:hidden; height:100%; }
    canvas { display:block; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
</head>
<body>
  <script src="shared/liquid-data.js"></script>
  <script>
    /* Bloom · between KPIs and narrative · "growth" sensation
       Center-spawn + radial divergent · density accumulates from middle out */
    let SC = null;
    let started = 0;
    const sketch = (p) => {
      p.setup = () => {
        const c = p.createCanvas(p.windowWidth, p.windowHeight);
        c.parent(document.body);
        started = performance.now();
        SC = NEXALiquidData.scene({
          bg:           '#0A0814',
          accent:       '#C85204',
          neutral:      '#605A52',
          kpiBag:       'energy',
          N:            7000,
          // strokeAlpha ramps from 6 → 14 over 600 frames (growth)
          strokeAlpha:  10,
          strokeAlphaStart: 6,
          strokeAlphaEnd:   14,
          strokeAlphaRampMs: 10000,
          washAlpha:    1.2,
          washEvery:    420,
          timeStep:     0.0009,
          baseSpeed:    0.95,
          weightDamp:   0.55,
          maxLife:      1100,
          burstThreshold: 0.80,
          // Radial divergent bias · pushes everything outward from center
          biasFn: (part, W, H) => {
            const cx = W * 0.5, cy = H * 0.5;
            const dx = part.x - cx, dy = part.y - cy;
            const m = Math.hypot(dx, dy) || 1;
            return [(dx / m) * 0.18, (dy / m) * 0.18];
          },
          // Spawn near center
          spawn: (W, H) => {
            const cx = W * 0.5, cy = H * 0.5;
            const r = Math.random() * Math.min(W, H) * 0.18;
            const a = Math.random() * Math.PI * 2;
            return [cx + Math.cos(a) * r, cy + Math.sin(a) * r];
          },
          respawn: (W, H) => {
            const cx = W * 0.5, cy = H * 0.5;
            const r = Math.random() * Math.min(W, H) * 0.10;
            const a = Math.random() * Math.PI * 2;
            return [cx + Math.cos(a) * r, cy + Math.sin(a) * r];
          }
        });
        SC.init(p);
      };
      p.draw = () => SC && SC.tick(p);
      p.windowResized = () => {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
        SC && SC.init(p);
      };
    };
    new p5(sketch);

    window.addEventListener('message', (e) => {
      if (!e.data || !SC) return;
      if (e.data.type === 'pause')  SC.pause();
      if (e.data.type === 'resume') SC.resume();
    });
  </script>
</body>
</html>
