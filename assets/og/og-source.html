<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<title>OG Source · NEXA RS 2025</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=JetBrains+Mono:wght@500&display=swap">
<style>
  /* OG image 1200x630 · fundo laranja NEXA + ICONE OFICIAL branco (logo-pack),
     "Relatório de Sustentabilidade" em cima e "2025" embaixo (branco, bold).
     Render: headless Chrome --window-size=1200,630 --virtual-time-budget=6000 --screenshot. */
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px; height: 630px;
    background: #C85204;            /* NEXA orange · Pantone 2020 C */
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
    color: #fff;
    font-family: 'Montserrat', sans-serif;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 30px; font-weight: 500;
    letter-spacing: 0.30em; text-transform: uppercase;
    color: #fff;
  }
  /* Icone oficial NEXA (4 barras retas, branco). PNG tem padding transparente. */
  .x-mark { height: 320px; width: auto; display: block; margin: -8px 0; }
  .year {
    font-family: 'Montserrat', sans-serif;
    font-size: 116px; font-weight: 700;
    letter-spacing: -0.01em; line-height: 1;
    color: #fff;
  }
</style>
</head>
<body>
  <div class="eyebrow">Relatório de Sustentabilidade</div>
  <img class="x-mark" src="../brand/logo-pack/4_Versao_Monocromatica/1_Versao_Secundaria/PNG/sem_fundo/Nexa_icon_branco_Prancheta%201.png" alt="">
  <div class="year">2025</div>
</body>
</html>
