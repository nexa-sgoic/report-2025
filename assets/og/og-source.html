<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<title>OG Source · NEXA RS 2025</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=JetBrains+Mono:wght@500&display=swap');
  html, body { margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    background: #03020C;             /* NEXA ink */
    position: relative;
    overflow: hidden;
    font-family: 'Montserrat', sans-serif;
    color: #fff;
  }
  /* Suns pattern · scattered behind, low opacity */
  .suns-bg {
    position: absolute; inset: 0;
    z-index: 0;
    opacity: 0.18;
  }
  /* X NEXA mark · giant on the left, peach + orange */
  .x-mark {
    position: absolute;
    left: 80px;
    top: 50%;
    transform: translateY(-50%);
    width: 320px;
    height: 320px;
    z-index: 2;
  }
  .x-mark .x-poly { transition: none; }
  /* Type block — right side */
  .type-block {
    position: absolute;
    right: 80px;
    top: 50%;
    transform: translateY(-50%);
    text-align: left;
    z-index: 3;
    max-width: 640px;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.32em;
    color: #EDCCC0;                  /* NEXA peach */
    text-transform: uppercase;
    margin-bottom: 28px;
  }
  .year {
    font-family: 'Montserrat', sans-serif;
    font-size: 232px;
    font-weight: 200;
    color: #fff;
    line-height: 0.92;
    letter-spacing: -0.04em;
    margin: 0;
  }
  .org {
    font-family: 'Montserrat', sans-serif;
    font-size: 38px;
    font-weight: 700;
    color: #C85204;                  /* NEXA orange */
    letter-spacing: 0.10em;
    text-transform: uppercase;
    margin-top: 18px;
  }
  .sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    color: #EDCCC0;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 6px;
    opacity: 0.78;
  }
  /* Frame brackets corners — NEXA detail */
  .br { position: absolute; width: 28px; height: 28px; border: 2px solid #C85204; z-index: 4; }
  .br-tl { top: 36px; left: 36px; border-right: 0; border-bottom: 0; }
  .br-tr { top: 36px; right: 36px; border-left: 0; border-bottom: 0; }
  .br-bl { bottom: 36px; left: 36px; border-right: 0; border-top: 0; }
  .br-br { bottom: 36px; right: 36px; border-left: 0; border-top: 0; }
</style>
</head>
<body>

<svg class="suns-bg" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <g id="suns"></g>
</svg>

<svg class="x-mark" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <g fill="#EDCCC0">
    <polygon class="x-poly" points="16,25 14,34 46,49 47,44"/>
    <polygon class="x-poly" points="84,25 86,34 54,49 53,44"/>
    <polygon class="x-poly" points="16,75 14,66 46,51 47,56"/>
    <polygon class="x-poly" points="84,75 86,66 54,51 53,56"/>
  </g>
  <g fill="#C85204" opacity="0.85" transform="translate(2 2)">
    <polygon points="16,25 14,34 46,49 47,44"/>
    <polygon points="84,25 86,34 54,49 53,44"/>
    <polygon points="16,75 14,66 46,51 47,56"/>
    <polygon points="84,75 86,66 54,51 53,56"/>
  </g>
</svg>

<div class="br br-tl"></div>
<div class="br br-tr"></div>
<div class="br br-bl"></div>
<div class="br br-br"></div>

<div class="type-block">
  <div class="eyebrow">Relatório de Sustentabilidade</div>
  <div class="year">2025</div>
  <div class="org">NEXA</div>
  <div class="sub">SGOIC · Sociedade Gestora</div>
</div>

<script>
  // Sun motif · radial lines from a center point. Scattered constellation.
  // Each "sun" is 12 lines radiating out at fixed angles.
  const positions = [
    { cx: 220, cy: 80,   r: 50 },
    { cx: 1020, cy: 60,  r: 70 },
    { cx: 480, cy: 580,  r: 60 },
    { cx: 900, cy: 500,  r: 90 },
    { cx: 60,  cy: 350,  r: 45 },
    { cx: 1140, cy: 280, r: 55 },
  ];
  const svgns = 'http://www.w3.org/2000/svg';
  const g = document.getElementById('suns');
  const N = 12; // 12 rays per sun
  positions.forEach(p => {
    for (let i = 0; i < N; i++) {
      const a = (i / N) * Math.PI * 2;
      const x1 = p.cx + Math.cos(a) * (p.r * 0.30);
      const y1 = p.cy + Math.sin(a) * (p.r * 0.30);
      const x2 = p.cx + Math.cos(a) * p.r;
      const y2 = p.cy + Math.sin(a) * p.r;
      const line = document.createElementNS(svgns, 'line');
      line.setAttribute('x1', x1);
      line.setAttribute('y1', y1);
      line.setAttribute('x2', x2);
      line.setAttribute('y2', y2);
      line.setAttribute('stroke', '#EDCCC0');
      line.setAttribute('stroke-width', 1.5);
      line.setAttribute('stroke-linecap', 'round');
      g.appendChild(line);
    }
  });
</script>

</body>
</html>
